version: "3.9"

networks:
  internal:
    driver: bridge

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    expose:
      - "8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 127.0.0.1
      --port 8000
      --workers 4
      --no-server-header
      --forwarded-allow-ips "*"
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    expose:
      - "6379"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  flower:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: celery -A app.tasks flower --port=5555 --url-prefix=flower
    expose:
      - "5555"
    ports:
      - "127.0.0.1:5555:5555"    # local-only — not exposed to internet
    env_file: .env
    depends_on:
      - redis
    networks:
      - internal
    profiles:
      - dev                       # only starts with: docker compose --profile dev up
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
